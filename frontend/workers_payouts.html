<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>VITA · Payout History</title>
  <link rel="stylesheet" href="vita.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@700&display=swap');

    .payout-row {
      display:flex; align-items:center; justify-content:space-between;
      padding:1.25rem; background:white; border-radius:1.25rem;
      border:1px solid #f1f5f9; transition:all 0.2s ease;
    }
    .payout-row:hover { 
      transform: translateY(-2px);
      box-shadow:0 10px 25px -5px rgba(0,0,0,0.05); 
      border-color: #e2e8f0;
    }
    .pay-icon { 
      width:3.25rem; height:3.25rem; border-radius:1rem; 
      display:flex; align-items:center; justify-content:center; 
      font-size:1.25rem; flex-shrink:0; 
    }
    .summary-strip { display:grid; grid-template-columns:repeat(3,1fr); gap:1rem; margin-bottom:1.5rem; }
    
    /* Clean Shimmer Effect */
    .shimmer {
      background: linear-gradient(90deg, #f1f5f9 25%, #f8fafc 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: shimmer 1.5s infinite;
    }
    @keyframes shimmer {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media(max-width:600px){ .summary-strip{grid-template-columns:1fr;} }
  </style>
</head>
<body class="bg-gray-50">

<div id="main">
  <div id="page-content" class="max-w-4xl mx-auto p-4 md:p-8">

    <div class="fade-up" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2rem;">
      <div>
        <h1 style="font-size:1.5rem;font-weight:900;color:#0f172a;">Payout History</h1>
        <p style="font-size:0.85rem;color:#64748b;margin-top:4px;">
            <i class="fa-solid fa-bolt-lightning text-orange-500 mr-1"></i> Automated UPI settlements
        </p>
      </div>
      <button class="btn-ghost" onclick="loadPayouts()" style="background:#fff; padding: 0.5rem 1rem; border-radius: 0.75rem; border: 1px solid #e2e8f0; font-weight: 700; font-size: 0.8rem; cursor: pointer;">
        <i class="fa-solid fa-rotate mr-1"></i> REFRESH
      </button>
    </div>

    <div class="summary-strip fade-up">
      <div class="card p-6 bg-white rounded-2xl border border-slate-100 shadow-sm">
        <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Total Paid Out</div>
        <div class="text-2xl font-black text-slate-800" id="sum-total">₹—</div>
      </div>
      <div class="card p-6 bg-white rounded-2xl border border-slate-100 shadow-sm">
        <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Claims Approved</div>
        <div class="text-2xl font-black text-slate-800" id="sum-approved">—</div>
      </div>
      <div class="card p-6 bg-white rounded-2xl border border-slate-100 shadow-sm">
        <div class="text-[10px] font-black uppercase tracking-widest text-slate-400 mb-1">Approval Rate</div>
        <div class="text-2xl font-black text-green-600" id="sum-rate">—</div>
      </div>
    </div>

    <h2 class="text-[11px] font-black text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Recent Transactions</h2>

    <div class="space-y-4 fade-up" id="payout-list">
      <div style="height:5rem;border-radius:1.25rem;" class="shimmer"></div>
      <div style="height:5rem;border-radius:1.25rem;" class="shimmer"></div>
      <div style="height:5rem;border-radius:1.25rem;" class="shimmer"></div>
    </div>

  </div>
</div>

<script src="vita.js"></script>
<script>
// IMPORTANT: Point to your Render Backend
const BACKEND_URL = "https://vita23-backend.onrender.com";

// If VITA.init isn't fully defined in your vita.js, we ensure loadPayouts triggers
window.addEventListener('DOMContentLoaded', loadPayouts);

async function loadPayouts() {
  try {
    // Note: Adjust endpoint to your actual Python route (e.g., /api/payouts)
    const response = await fetch(`${BACKEND_URL}/api/payouts`);
    const payData = response.ok ? await response.json() : null;

    if (payData) {
      document.getElementById('sum-total').textContent = `₹${payData.total_paid_out.toLocaleString('en-IN')}`;
      document.getElementById('sum-approved').textContent = payData.approved_claims;
      document.getElementById('sum-rate').textContent = payData.approval_rate + '%';
      
      renderList(payData.history); 
    } else {
      // If backend fails, show dummy data for demo
      console.warn("Backend unreachable, using demo data");
      showDemoData();
    }
  } catch (err) {
    console.error("Fetch error:", err);
    showDemoData();
  }
}

function showDemoData() {
  const demoHistory = [
    { id: 'VITA-7721', event: 'Heavy Rain Coverage', date: '05 Apr 2026', zone: 'RED', amount: 800, status: 'Completed', color: 'green', icon: 'shield-check' },
    { id: 'VITA-6542', event: 'AQI Disruption', date: '03 Apr 2026', zone: 'ORANGE', amount: 450, status: 'Completed', color: 'green', icon: 'wind' },
    { id: 'VITA-5512', event: 'Zone Risk Payout', date: '01 Apr 2026', zone: 'YELLOW', amount: 300, status: 'Completed', color: 'green', icon: 'location-dot' }
  ];
  renderList(demoHistory);
  document.getElementById('sum-total').textContent = "₹1,550";
  document.getElementById('sum-approved').textContent = "3";
  document.getElementById('sum-rate').textContent = "100%";
}

function renderList(history) {
  const iconBg = {'green':'#f0fdf4','blue':'#eff6ff','orange':'#fff7ed','purple':'#faf5ff'};
  const iconTx = {'green':'#16a34a','blue':'#1d4ed8','orange':'#ea580c','purple':'#7e22ce'};

  document.getElementById('payout-list').innerHTML = history.map(p => `
    <div class="payout-row">
      <div style="display:flex;align-items:center;gap:1.25rem;">
        <div class="pay-icon" style="background:${iconBg[p.color]||'#f1f5f9'};color:${iconTx[p.color]||'#475569'};">
          <i class="fa-solid fa-${p.icon || 'circle-check'}"></i>
        </div>
        <div>
          <div style="font-size:0.95rem;font-weight:900;color:#1e293b;">${p.id}</div>
          <div style="font-size:0.75rem;font-weight:600;color:#64748b;">${p.event}</div>
          <div style="font-size:0.6rem;color:#94a3b8;font-weight:800;text-transform:uppercase;margin-top:4px; letter-spacing: 0.05em;">
            ${p.date} • <span style="color:${p.zone === 'RED' ? '#ef4444' : '#f59e0b'}">${p.zone} ZONE</span>
          </div>
        </div>
      </div>
      <div style="text-align:right;">
        <div style="font-size:1.25rem;font-weight:900;font-family:'JetBrains Mono',monospace;color:#0f172a;">₹${p.amount}</div>
        <div style="display:flex; align-items:center; gap:4px; justify-content:flex-end; margin-top:4px;">
            <div class="w-1.5 h-1.5 rounded-full bg-green-500"></div>
            <span style="font-size:0.65rem; font-weight:900; color:#16a34a; text-transform:uppercase;">${p.status}</span>
        </div>
      </div>
    </div>
  `).join('');
}
</script>
</body>
</html>
