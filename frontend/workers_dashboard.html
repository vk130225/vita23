<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>VITA · Dashboard</title>
    <link rel="stylesheet" href="vita.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .stat-grid { display:grid; grid-template-columns:repeat(4,1fr); gap:1rem; }
        @media(max-width:900px){.stat-grid{grid-template-columns:1fr 1fr;}}
        .main-grid { display:grid; grid-template-columns:280px 1fr; gap:1rem; }
        @media(max-width:900px){.main-grid{grid-template-columns:1fr;}}
    </style>
</head>
<body>

<div id="sidebar"></div>

<div id="main">
    <div id="topbar"></div>
    <div id="page-content" class="p-6 md:p-10">

        <div class="fade-up" style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem;">
            <div>
                <h1 style="font-size:1.5rem;font-weight:900;color:#0f172a;">Dashboard</h1>
                <p style="font-size:0.8rem;color:#94a3b8;margin-top:2px;">Real-time insurance telemetry</p>
            </div>
            <button class="btn-primary" onclick="runQuickARCE()" id="eval-btn">
                <i class="fa-solid fa-bolt"></i> QUICK ARCE EVAL
            </button>
        </div>

        <div class="stat-grid fade-up" style="margin-bottom:1.5rem;">
            <div class="card card-pad">
                <div class="stat-label uppercase tracking-widest text-[10px]">Weeks Covered</div>
                <div class="stat-value" id="s-weeks">--</div>
                <div style="font-size:0.65rem;color:#e65a28;margin-top:4px;font-weight:700;">🔥 Active streak</div>
            </div>
            <div class="card card-pad">
                <div class="stat-label uppercase tracking-widest text-[10px]">Total Payouts</div>
                <div class="stat-value mono" id="s-payouts">₹--</div>
            </div>
            <div class="card card-pad">
                <div class="stat-label uppercase tracking-widest text-[10px]">Total Premiums</div>
                <div class="stat-value mono" id="s-premiums">₹--</div>
            </div>
            <div class="card card-pad">
                <div class="stat-label uppercase tracking-widest text-[10px]">Approval Rate</div>
                <div class="stat-value" id="s-rate">--%</div>
            </div>
        </div>

        <div class="main-grid fade-up">
            <div class="dark-card" style="display:flex;flex-direction:column;gap:1.5rem; padding: 2rem; border-radius: 2rem;">
                <div style="display:flex;align-items:center;justify-content:space-between;">
                    <div class="card-title text-white" style="margin-bottom:0;">Live ARCE</div>
                    <a href="workers_pipeline.html" style="font-size:0.65rem;font-weight:800;color:#e65a28;text-decoration:none;">FULL VIEW →</a>
                </div>
                <div id="mini-pipeline" style="display:flex;flex-direction:column;gap:10px;">
                    </div>
                <div class="text-center pt-4 border-t border-slate-800">
                    <svg width="100" height="100" viewBox="0 0 80 80">
                        <circle cx="40" cy="40" r="32" fill="none" stroke="#1e293b" stroke-width="8"/>
                        <circle id="score-ring" cx="40" cy="40" r="32" fill="none" stroke="#e65a28" stroke-width="8"
                          stroke-linecap="round" stroke-dasharray="201.1" stroke-dashoffset="201.1"
                          transform="rotate(-90 40 40)" style="transition: stroke-dashoffset 1s ease;"/>
                        <text x="40" y="46" text-anchor="middle" font-family="JetBrains Mono" font-size="14" font-weight="700" fill="white" id="score-text">0.0</text>
                    </svg>
                    <div id="arce-dec" style="font-size:0.8rem;font-weight:900;color:#64748b;margin-top:10px;text-transform:uppercase;">Ready</div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="card card-pad flex items-center justify-between" style="background: #f0fdf4; border-color: #bbf7d0;">
                    <div class="flex items-center gap-4">
                        <div class="w-12 h-12 rounded-xl bg-white flex items-center justify-center text-green-600 shadow-sm">
                            <i class="fa-solid fa-shield-check text-xl"></i>
                        </div>
                        <div>
                            <div class="font-black text-slate-800" id="cov-zone">Loading Coverage...</div>
                            <div class="text-xs text-slate-500" id="cov-hours">Synchronizing with ARCE node</div>
                        </div>
                    </div>
                    <div class="text-right">
                        <div class="stat-label">Premium</div>
                        <div class="text-xl font-black text-slate-800" id="cov-premium">₹--</div>
                    </div>
                </div>

                <div class="card card-pad bg-white">
                    <div class="card-title">Recent Activity</div>
                    <div id="recent-activity" class="space-y-3 mt-4">
                        <div class="shimmer h-12 rounded-xl"></div>
                        <div class="shimmer h-12 rounded-xl"></div>
                    </div>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="vita.js"></script>
<script>
    // Initialize shared UI and load data
    VITA.init({ page: 'dashboard' }).then(() => {
        loadDashboard();
    });

    async function loadDashboard() {
        try {
            const worker = await VITA.api('/api/worker/AK001');
            const stats = await VITA.api('/api/claims/stats');

            if (worker) {
                document.getElementById('s-weeks').textContent = worker.weeks_covered;
                document.getElementById('s-payouts').textContent = `₹${worker.total_payouts.toLocaleString()}`;
                document.getElementById('s-premiums').textContent = `₹${worker.total_premiums.toLocaleString()}`;
                document.getElementById('cov-zone').textContent = `${worker.zone} ZONE ACTIVE`;
                document.getElementById('cov-premium').textContent = `₹${worker.weekly_premium}`;
                document.getElementById('cov-hours').textContent = `${worker.coverage_hours_per_week || 84} hrs/week protected`;
            }

            if (stats) {
                document.getElementById('s-rate').textContent = stats.approval_rate + '%';
            }

            // Fill mini pipeline
            const steps = ['Weather', 'GPS Verify', 'Network', 'Anti-Fraud', 'Sensors', 'Platform'];
            document.getElementById('mini-pipeline').innerHTML = steps.map(s => `
                <div class="flex items-center gap-3">
                    <i class="fa-solid fa-circle-dot text-[8px] text-slate-700"></i>
                    <span class="text-[10px] font-bold text-slate-400 uppercase tracking-widest">${s}</span>
                </div>
            `).join('');

            loadActivity();
        } catch (e) {
            console.error("Dashboard Load Error", e);
        }
    }

    async function loadActivity() {
        const data = await VITA.api('/api/payouts/recent?limit=3');
        const container = document.getElementById('recent-activity');
        if (data && data.payouts.length) {
            container.innerHTML = data.payouts.map(p => `
                <div class="flex items-center justify-between p-4 bg-slate-50 rounded-xl border border-slate-100">
                    <div class="flex items-center gap-3">
                        <div class="w-8 h-8 rounded-lg brand-orange flex items-center justify-center text-white text-xs">
                            <i class="fa-solid fa-receipt"></i>
                        </div>
                        <div>
                            <div class="text-xs font-black text-slate-800">₹${p.amount} • ${p.event}</div>
                            <div class="text-[9px] font-bold text-slate-400 uppercase">${p.date}</div>
                        </div>
                    </div>
                    <span class="text-[9px] font-black text-green-600 bg-green-50 px-2 py-1 rounded-md uppercase">${p.status}</span>
                </div>
            `).join('');
        } else {
            container.innerHTML = '<p class="text-xs text-slate-400 italic p-4">No recent activity detected.</p>';
        }
    }

    async function runQuickARCE() {
        const btn = document.getElementById('eval-btn');
        btn.disabled = true;
        btn.innerHTML = '<i class="fa-solid fa-circle-notch fa-spin"></i> RUNNING...';
        
        try {
            const res = await VITA.api('/api/claims/run-evaluation', 'POST');
            if (res) {
                VITA.updateScoreRing('score-ring', 'score-text', res.arce_score, 201.1);
                document.getElementById('arce-dec').textContent = res.decision;
                document.getElementById('arce-dec').style.color = res.decision === 'APPROVED' ? '#22c55e' : '#ef4444';
            }
        } finally {
            btn.disabled = false;
            btn.innerHTML = '<i class="fa-solid fa-bolt"></i> QUICK ARCE EVAL';
            loadDashboard();
        }
    }
</script>
</body>
</html>
